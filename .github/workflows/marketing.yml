name: Marketing Automation

on:
  schedule:
    # 内容日历：每周日 UTC 08:30（Bluesky 生成之前）
    - cron: '30 8 * * 0'
    # 博客生产：每周一/三/五 UTC 02:00（v2: 3篇/周）
    - cron: '0 2 * * 1,3,5'
    # Bluesky 内容生成：每周日 UTC 10:00
    - cron: '0 10 * * 0'
    # Bluesky 发布：每日 UTC 22:00
    - cron: '0 22 * * *'
    # 互动分析：每3天 UTC 08:00
    - cron: '0 8 * * 0,3,6'
    # PM 周报：每周一 UTC 09:00
    - cron: '0 9 * * 1'
    # PM 脉冲：周三、周五 UTC 09:00
    - cron: '0 9 * * 3,5'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to run manually'
        required: true
        type: choice
        options:
          - content-strategist
          - blog
          - bluesky-generate
          - bluesky-publish
          - reddit
          - analysis
          - pm
          - pm-pulse

permissions:
  contents: write

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
  BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
  REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
  REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
  REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
  REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
  MARKETING_EMAIL: ${{ secrets.MARKETING_EMAIL }}
  BLUESKY_AUTO_PUBLISH: 'true'

jobs:
  content-strategist:
    name: Content Strategist (Weekly Plan)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' &&
       github.event.schedule == '30 8 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.agent == 'content-strategist')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: node content-strategist-agent.js
        working-directory: marketing/agents
      - name: Commit weekly plan if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/content/weekly-plan.json
          git diff --staged --quiet || git commit -m "chore(marketing): update weekly content plan"
          git push || true

  blog:
    name: Blog Content Agent
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 2 * * 1,3,5') ||
      (github.event_name == 'workflow_dispatch' && inputs.agent == 'blog')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: node blog-agent.js
        working-directory: marketing/agents

  bluesky-generate:
    name: Bluesky Generate Weekly Batch
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 10 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.agent == 'bluesky-generate')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: BLUESKY_MODE=generate BLUESKY_AUTO_PUBLISH=true node bluesky-agent.js
        working-directory: marketing/agents

  bluesky-publish:
    name: Bluesky Daily Publish
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 22 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.agent == 'bluesky-publish')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: BLUESKY_MODE=publish node bluesky-agent.js
        working-directory: marketing/agents

  reddit:
    name: Reddit Monitor & Reply
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.agent == 'reddit'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Random delay
        run: sleep $((RANDOM % 1800))
      - run: node reddit-agent.js
        working-directory: marketing/agents

  analysis:
    name: Interaction Analysis & Email
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 8 * * 0,3,6') ||
      (github.event_name == 'workflow_dispatch' && inputs.agent == 'analysis')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: node analysis-agent.js
        working-directory: marketing/agents

  pm:
    name: PM Weekly Report
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 9 * * 1') ||
      (github.event_name == 'workflow_dispatch' && inputs.agent == 'pm')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: PM_MODE=weekly node pm-agent.js
        working-directory: marketing/agents

  pm-pulse:
    name: PM Pulse Check
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 9 * * 3,5') ||
      (github.event_name == 'workflow_dispatch' && inputs.agent == 'pm-pulse')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: PM_MODE=pulse node pm-agent.js
        working-directory: marketing/agents
